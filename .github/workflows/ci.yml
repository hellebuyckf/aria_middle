name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Qualité de code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: uv sync --frozen --all-groups

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format
        run: uv run ruff format --check .

      - name: Pyright — type checking
        run: uv run pyright

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    env:
      VLLM_BASE_URL: http://localhost:8001/v1
      URL_BACK_LLM: http://localhost:8001
      CHROMADB_PATH: ./data/corpus
      SESSIONS_DIR: ./data/sessions
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: uv sync --frozen --all-groups

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short

  security:
    name: Sécurité des bibliothèques
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: uv sync --frozen --all-groups

      - name: Exporter les dépendances de production
        run: uv export --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: pip-audit — audit des CVE
        run: uvx pip-audit --requirement /tmp/requirements.txt --desc
